  dependency-check:
    name: OWASP Dependency Check

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "zero-trust-supply-chain"
          path: "."
          format: "HTML"
          out: "reports"
          args: >
            --failOnCVSS 9
            --suppression dependency-check-suppressions.xml

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports

  checkov:
    name: Checkov IaC Scan

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Checkov
        run: |
          python3 -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        continue-on-error: true
        run: |
          mkdir -p reports
          checkov -d . --external-checks-dir checkov-policies -o json > reports/checkov.json
          checkov -d . --external-checks-dir checkov-policies -o sarif > reports/results.sarif

      - name: Severity Gate
        run: python scripts/checkov_gate.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Checkov-report
          path: reports
