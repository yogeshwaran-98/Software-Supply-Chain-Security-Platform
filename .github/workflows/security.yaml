name: Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
  name: Semgrep SAST

  runs-on: ubuntu-latest

  container:
    image: semgrep/semgrep

  steps:
    - uses: actions/checkout@v4

    - run: semgrep scan \
        --config=p/default \
        --sarif \
        --output=semgrep.sarif

    - uses: actions/upload-artifact@v4
      with:
        name: semgrep-report
        path: semgrep.sarif
